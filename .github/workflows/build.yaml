name: Ubuntu MUSL Test Build

on:
  workflow_dispatch:

jobs:
  build-ubuntu:
    name: Build Ubuntu Binary (musl)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools pkg-config dbus-1

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
          components: rustfmt, clippy

      - name: Build for Ubuntu
        run: cargo build --target=x86_64-unknown-linux-musl --profile=release

      - name: Verify static linking
        run: ldd target/x86_64-unknown-linux-musl/release/spaces || echo "Binary is statically linked"
