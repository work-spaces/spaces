name: Build and Publish Binaries

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build and upload binaries for (e.g. v1.2.3)"
        required: true
        type: string

jobs:
  check-release:
    name: Verify Release Exists
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Check that release ${{ inputs.tag }} exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "${{ inputs.tag }}" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "::error::Release '${{ inputs.tag }}' does not exist in ${{ github.repository }}. Create the release before running this workflow."
            exit 1
          fi
          echo "Release '${{ inputs.tag }}' found."

  build-ubuntu:
    name: Build and Publish Ubuntu Binary
    needs: check-release
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      pull-requests: write
      repository-projects: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: x86_64-unknown-linux-musl
          components: rustfmt, clippy

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: rustup add musl
        run: rustup target add x86_64-unknown-linux-musl

      - name: Build for Ubuntu
        run: cargo build --target=x86_64-unknown-linux-musl --profile=release

      - name: Create binary artifact
        run: |
          mkdir -p artifacts
          (cd target/x86_64-unknown-linux-musl/release; zip ../../../artifacts/spaces-linux-x86_64-${{ inputs.tag }}.zip spaces)

      - name: Publish release with Ubuntu binary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ inputs.tag }} artifacts/spaces-linux-x86_64-${{ inputs.tag }}.zip --clobber

  build-matrix-windows:
    name: Build and Upload Other OS Binaries
    needs: check-release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
      pull-requests: write
      repository-projects: write
    strategy:
      matrix:
        os: [windows-latest]
        arch: [x86_64-pc-windows-gnu]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          components: rustfmt, clippy

      - name: Build for ${{ matrix.os }}
        run: |
          rustup target add ${{ matrix.arch }}
          cargo build --profile=release  --target=${{ matrix.arch }}

      - name: Create binary executable
        run: |
          mkdir -p artifacts
          (cd target/${{ matrix.arch }}/release; 7z a -tzip ../../../artifacts/spaces-windows-x86_64-${{ inputs.tag }}.zip spaces.exe)
        shell: bash

      - name: Upload binary to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh.exe release upload ${{ inputs.tag }} artifacts/spaces-windows-x86_64-${{ inputs.tag }}.zip --clobber

  build-matrix-macos:
    name: Build and Upload Other OS Binaries
    needs: check-release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
      pull-requests: write
      repository-projects: write
    strategy:
      matrix:
        os: [macos-latest]
        arch: [x86_64, aarch64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}
          components: rustfmt, clippy

      - name: Build for ${{ matrix.os }}
        run: |
          rustup target add ${{ matrix.arch }}-apple-darwin
          cargo build --profile=release --target=${{ matrix.arch }}-apple-darwin

      - name: Create binary artifact (zip)
        run: |
          mkdir -p artifacts
          (cd target/${{ matrix.arch }}-apple-darwin/release; zip ../../../artifacts/spaces-macos-${{ matrix.arch }}-${{ inputs.tag }}.zip spaces)
        shell: bash

      - name: Upload binary to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ inputs.tag }} \
            artifacts/spaces-macos-${{ matrix.arch }}-${{ inputs.tag }}.zip --clobber

  build-linux-aarch64:
    name: Build and Upload Linux aarch64
    needs: check-release
    runs-on: ubuntu-22.04-arm
    permissions:
      contents: write
      pull-requests: write
      repository-projects: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Set up Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: aarch64-unknown-linux-musl
          components: rustfmt, clippy

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: rustup add musl
        run: rustup target add aarch64-unknown-linux-musl

      - name: Build for Ubuntu
        run: cargo build --target=aarch64-unknown-linux-musl --profile=release

      - name: Create binary artifact
        run: |
          mkdir -p artifacts
          (cd target/aarch64-unknown-linux-musl/release; zip ../../../artifacts/spaces-linux-aarch64-${{ inputs.tag }}.zip spaces)

      - name: Upload binary to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ inputs.tag }} \
            artifacts/spaces-linux-aarch64-${{ inputs.tag }}.zip --clobber
