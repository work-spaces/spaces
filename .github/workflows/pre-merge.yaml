name: Pre-Merge Build

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: work-spaces/spaces-checkout-run@acf38dfd2669355dafa885232f6eb7036d81003f
        with:
          checkout: --locked --url=https://github.com/work-spaces/spaces --rev=${{ github.head_ref }}
          run: //spaces:check_rust_clippy
